name: Testes e validação

# Roda a suíte de testes do núcleo a cada push e Pull Request.
# É a evidência automatizada de que a solução funciona (disciplina Teste de
# Software — Hackathon IFRO Ariquemes 2026/1). O resultado fica visível na aba
# "Actions" e no selo do README.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    name: Suíte de testes (npm test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm install

      - name: Verificação de tipos (TypeScript)
        run: npx tsc --noEmit

      - name: Rodar testes (caminho feliz + erro/valor-limite)
        run: npm test
